name:  CI/CD Pipeline 🚀

# กำหนดให้ทำงานอัตโนมัติเมื่อมีการ Push หรือ Pull Request เข้า Branch 'main'
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ---------------------------------------------------
  # 🏭 Job 1: Build & Test Backend (.NET 10)
  # ---------------------------------------------------
  build-backend:
    name: Build .NET 10 Backend
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' # ใช้ .NET 10 ตามที่ออกแบบไว้

      - name: 📦 Restore Dependencies
        run: dotnet restore backend/MyBackend.slnx

      - name: 🔨 Build Backend
        run: dotnet build backend/MyBackend.slnx --configuration Release --no-restore

    

  # ---------------------------------------------------
  # 🌐 Job 2: Build Web Admin (React + Vite)
  # ---------------------------------------------------
  build-frontend-web:
    name: Build Web Admin (React)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # แนะนำใช้ Node 20 (LTS)
          cache: 'npm'
          cache-dependency-path: dynamic-datatable-board/package-lock.json

      - name: 📦 Install Dependencies
        working-directory: ./dynamic-datatable-board
        run: npm ci

      - name: 🔨 Build Web Frontend
        working-directory: ./dynamic-datatable-board
        run: npm run build

  # ---------------------------------------------------
  # 📱 Job 3: Check Mobile App (React Native / Expo)
  # ---------------------------------------------------
  build-mobile-app:
    name: Check Mobile App (Expo)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/app/package-lock.json

      - name: 📦 Install Dependencies
        working-directory: ./apps/app
        run: npm ci

      - name: 🔍 Type Check (TypeScript)
        working-directory: ./apps/app
        run: npx tsc --noEmit # เช็คว่าไม่ได้เขียน Type ผิดจนพัง